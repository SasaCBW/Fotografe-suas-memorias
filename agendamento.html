<!DOCTYPE html>

<head>

<meta charset="UTF-8">

<title>Agendamento | LS.fotostory</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<div class="logo">

<h1>LS<span>.fotostory</span></h1>

</div>


<nav>

<a href="index.html">Início</a>
<a href="galeria.html">Galeria</a>
<a href="agendamento.html">Agendamento</a>
<a href="contato.html">Contato</a>

</nav>

</header>



<section class="pagina">


<h2>
Agende seu momento
</h2>


<p>
Preencha as informações abaixo e entraremos em contato
para confirmar a disponibilidade.
</p>



<div class="formulario">


<form id="agendaForm">


<input 
type="text" 
id="nome"
placeholder="Nome completo"
required>



<input 
type="tel"
id="telefone"
placeholder="Telefone / WhatsApp"
required>



<select id="evento" required>

<option value="">
Escolha o tipo de evento
</option>

<option>
Casamento
</option>

<option>
Aniversário
</option>

<option>
Festa Junina
</option>

<option>
Ensaio fotográfico
</option>

<option>
Evento empresarial
</option>

<option>
Outro
</option>


</select>




<input 
type="date"
id="data"
required>



<input 
type="time"
id="horario"
required>




<textarea
id="mensagem"
placeholder="Conte mais detalhes sobre seu evento">
</textarea>



<button type="submit">

Enviar solicitação

</button>


</form>


</div>


</section>




<footer>

<p>
© 2026 LS.fotostory - Fotografia Profissional
</p>

</footer>



<script src="js/script.js"></script>


</body>

</html>
