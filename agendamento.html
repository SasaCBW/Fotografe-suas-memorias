<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento | LS.fotostory</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<h1>📸 LS.fotostory</h1>

<a href="login.html">
<button>
Área do cliente
</button>
</a>

</header>




<main class="painel">


<section>


<h2>
Solicite seu orçamento
</h2>



<input 
type="text"
id="nome"
placeholder="Seu nome">


<input 
type="tel"
id="telefone"
placeholder="WhatsApp">


<input 
type="email"
id="email"
placeholder="Seu e-mail">



<select id="evento">

<option>
Escolha o tipo de evento
</option>

<option>
Casamento
</option>

<option>
Aniversário
</option>

<option>
Festa Junina
</option>

<option>
Ensaio Fotográfico
</option>

<option>
Outro
</option>

</select>




<input 
type="date"
id="data">



<textarea
id="mensagem"
placeholder="Conte mais detalhes do evento">
</textarea>



<button id="enviarAgendamento">

Enviar solicitação

</button>



<p id="resultado"></p>



</section>


</main>



<script type="module" src="js/agendamento.js"></script>


</body>

</html>
