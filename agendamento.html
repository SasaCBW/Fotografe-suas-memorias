<section class="agendamento-banner">


<div>


<h1>
Vamos criar sua história?
</h1>


<p>
Agende uma conversa com a Sarah.
</p>


</div>


</section>







<section class="form-area">


<div class="form-box">



<h2>
Agendar reunião
</h2>



<p>
Preencha os dados abaixo e entraremos em contato.
</p>



<form id="formAgendamento">



<div class="campo">


<label>
Nome completo
</label>


<input 
type="text"
id="nome"
placeholder="Digite seu nome"
required>


</div>





<div class="campo">


<label>
WhatsApp
</label>


<input 
type="tel"
id="telefone"
placeholder="(42) 99999-9999"
required>


</div>





<div class="campo">


<label>
E-mail
</label>


<input 
type="email"
id="email"
placeholder="Seu melhor e-mail"
required>


</div>






<div class="campo">


<label>
Tipo de evento
</label>



<select id="evento">


<option>
Selecione
</option>


<option>
Casamento
</option>


<option>
Aniversário
</option>


<option>
Ensaio
</option>


<option>
Evento empresarial
</option>


<option>
Outro
</option>


</select>


</div>






<div class="duplo">



<div class="campo">


<label>
Data desejada
</label>


<input 
type="date"
id="data"
required>


</div>




<div class="campo">


<label>
Horário
</label>


<input 
type="time"
id="horario"
required>


</div>


</div>







<div class="campo">


<label>
Mensagem
</label>


<textarea
id="mensagem"
rows="5"
placeholder="Conte um pouco sobre seu evento..."
></textarea>


</div>






<button type="submit">


Enviar solicitação


</button>



</form>


</div>


</section>






<a 
href="https://wa.me/5542988620679"
