<!-- BANNER -->


<section class="agendamento-banner">


<div>

<h1>
Vamos criar sua história?
</h1>


<p>
Agende uma reunião com a Sarah.
</p>


</div>


</section>






<!-- FORMULÁRIO -->


<section class="form-area">


<div class="form-box">


<h2>
Agendar reunião
</h2>


<p>
Preencha os dados abaixo e entraremos em contato para conversar sobre seu evento.
</p>




<form id="formAgendamento">



<div class="campo">


<label>
Nome completo
</label>


<input 
type="text"
id="nome"
placeholder="Digite seu nome"
required>


</div>





<div class="campo">


<label>
WhatsApp
</label>


<input 
type="tel"
id="telefone"
placeholder="(42) 99999-9999"
required>


</div>





<div class="campo">


<label>
E-mail
</label>


<input 
type="email"
id="email"
placeholder="Digite seu e-mail"
required>


</div>





<div class="campo">


<label>
Tipo de evento
</label>


<select id="evento" required>


<option value="">
Selecione uma opção
</option>


<option>
Casamento
</option>


<option>
Aniversário
</option>


<option>
Ensaio fotográfico
</option>


<option>
Evento empresarial
</option>


<option>
Festa
</option>


<option>
Outro
</option>


</select>


</div>






<div class="duplo">



<div class="campo">


<label>
Data desejada
</label>


<input 
type="date"
id="data"
required>


</div>





<div class="campo">


<label>
Horário desejado
</label>


<input 
type="time"
id="horario"
required>


</div>


</div>







<div class="campo">


<label>
Mensagem
</label>


<textarea

id="mensagem"

rows="5"

placeholder="Conte detalhes sobre seu evento..."

></textarea>


</div>





<button type="submit">

Enviar solicitação

</button>



</form>



</div>


</section>
