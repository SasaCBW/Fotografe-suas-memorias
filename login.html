<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | LS.fotostory</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>


<div class="login-container">

    <img src="imagens/logo.png" class="logo">


    <h1>LS.fotostory</h1>

    <p>Acesse sua galeria de fotos</p>


    <input 
    type="email" 
    id="email"
    placeholder="Digite seu e-mail">


    <input 
    type="password"
    id="senha"
    placeholder="Digite sua senha">


    <button id="btnLogin">
        Entrar
    </button>


    <button id="btnGoogle">
        Entrar com Google
    </button>


    <p id="mensagem"></p>


</div>


<script type="module" src="js/login.js"></script>


</body>

</html>
