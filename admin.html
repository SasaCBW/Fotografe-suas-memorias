<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Painel Administrativo | LS.fotostory</title>


<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="topo">

<h1>
Painel LS.fotostory
</h1>


<p>
Gerenciamento de clientes e eventos
</p>


</header>



<section class="painel">


<h2>
Novo cliente / Evento
</h2>



<form id="clienteForm">


<input 
id="nomeCliente"
placeholder="Nome do cliente"
required>



<input 
id="telefoneCliente"
placeholder="WhatsApp"
required>



<input 
id="eventoCliente"
placeholder="Tipo de evento"
required>



<input 
id="dataCliente"
type="date"
required>



<select id="statusCliente">


<option>
Novo orçamento
</option>


<option>
Confirmado
</option>


<option>
Evento realizado
</option>


<option>
Fotos entregues
</option>


</select>



<button type="submit">

Cadastrar cliente

</button>


</form>




<hr>



<h2>
Clientes cadastrados
</h2>



<div id="listaClientes">

Carregando...

</div>



</section>




<script 
type="module"
src="js/admin.js">

</script>


</body>

</html>
