<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload de Fotos | LS.fotostory</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="topo">

<h1>
Enviar Fotos
</h1>

<p>
Área administrativa LS.fotostory
</p>

</header>




<section class="painel">


<h2>
Escolha o cliente
</h2>


<select id="cliente">

<option>
Carregando clientes...
</option>

</select>




<h2>
Selecionar fotos
</h2>


<input 
type="file"
id="fotos"
multiple
accept="image/*">



<button id="enviarFotos">

Enviar fotos

</button>



<p id="resultado"></p>



</section>




<script 
type="module"
src="js/upload.js">

</script>



</body>

</html>
